<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playbook Intelligence — Clausework</title>
    <link rel="stylesheet" href="app.css" />
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="root"></div>

    <script src="data.js"></script>
    <script src="data_loader.js"></script>
    <script type="text/babel" src="tweaks-panel.jsx"></script>
    <script type="text/babel" src="components.jsx"></script>
    <script type="text/babel" src="studio.jsx"></script>
    <script type="text/babel" src="alignment.jsx"></script>

    <script type="text/babel" data-presets="react">
      const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/ {
        studio_layout: "card-feed",
        alignment_view: "single",
        portfolio_layout: "heatmap",
        density: "comfortable",
        severity_palette: "warm",
      }; /*EDITMODE-END*/

      function App() {
        const [page, setPage] = React.useState("studio");
        const [focusRule, setFocusRule] = React.useState(
          (RULES && RULES[0] && RULES[0].id) || null,
        );
        const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

        const tweaksWithSetter = { ...t, _set: setTweak };

        return (
          <div className="app">
            <TopBar page={page} setPage={setPage} playbookMeta={CORPUS_META} />
            <div className="app-body">
              {page === "studio" && (
                <PlaybookStudio
                  tweaks={tweaksWithSetter}
                  focusRule={focusRule}
                  setFocusRule={setFocusRule}
                />
              )}
              {page === "alignment" && (
                <ContractAlignment
                  tweaks={tweaksWithSetter}
                  gotoStudio={() => setPage("studio")}
                />
              )}
            </div>

            <TweaksPanel>
              <TweakSection label="Layout">
                <TweakRadio
                  label="Studio"
                  value={t.studio_layout}
                  options={[
                    { value: "card-feed", label: "Cards" },
                    { value: "kanban", label: "Kanban" },
                    { value: "table", label: "Table" },
                  ]}
                  onChange={(v) => setTweak("studio_layout", v)}
                />
                <TweakRadio
                  label="Portfolio"
                  value={t.portfolio_layout}
                  options={[
                    { value: "heatmap", label: "Heatmap" },
                    { value: "bubble", label: "Bar" },
                    { value: "matrix", label: "Matrix" },
                  ]}
                  onChange={(v) => setTweak("portfolio_layout", v)}
                />
                <TweakRadio
                  label="Density"
                  value={t.density}
                  options={[
                    { value: "comfortable", label: "Comfy" },
                    { value: "compact", label: "Compact" },
                  ]}
                  onChange={(v) => setTweak("density", v)}
                />
              </TweakSection>
              <TweakSection label="Severity color">
                <TweakRadio
                  label="Palette"
                  value={t.severity_palette}
                  options={[
                    { value: "warm", label: "Warm" },
                    { value: "traffic", label: "Traffic" },
                    { value: "ink", label: "Ink" },
                  ]}
                  onChange={(v) => setTweak("severity_palette", v)}
                />
              </TweakSection>
            </TweaksPanel>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      const ready = window.__PLAYBOOK_READY || Promise.resolve();
      ready.then(() => {
        // data_loader has rendered an error overlay if __PLAYBOOK_LIVE is false.
        // Skip the React mount in that case so the overlay stays visible.
        if (window.__PLAYBOOK_LIVE === false) return;
        root.render(<App />);
      });
    </script>
  </body>
</html>
